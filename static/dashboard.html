<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SDN Link Failure Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }

    header {
      background: #1a1d2e;
      padding: 14px 24px;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; color: #7eb8f7; letter-spacing: 1px; }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; display: inline-block; margin-right: 8px; }
    #status-dot.alive { background: #4cff91; box-shadow: 0 0 6px #4cff91; }

    .main { display: flex; flex: 1; overflow: hidden; }

    #topology-panel {
      flex: 1;
      position: relative;
      border-right: 1px solid #2a2d3e;
    }
    #topology-panel h2 {
      position: absolute; top: 12px; left: 16px;
      font-size: 0.75rem; color: #7eb8f7; letter-spacing: 1px; text-transform: uppercase;
    }
    svg { width: 100%; height: 100%; }

    #right-panel { width: 340px; display: flex; flex-direction: column; }

    #stats-bar {
      display: flex;
      border-bottom: 1px solid #2a2d3e;
    }
    .stat-box {
      flex: 1;
      padding: 14px;
      text-align: center;
      border-right: 1px solid #2a2d3e;
    }
    .stat-box:last-child { border-right: none; }
    .stat-box .val { font-size: 1.6rem; font-weight: bold; color: #7eb8f7; }
    .stat-box .lbl { font-size: 0.65rem; color: #888; margin-top: 2px; }

    #event-log { flex: 1; overflow-y: auto; padding: 10px; }
    #event-log h2 { font-size: 0.75rem; color: #7eb8f7; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }

    .event-entry {
      background: #1a1d2e;
      border-left: 3px solid #444;
      padding: 7px 10px;
      margin-bottom: 6px;
      border-radius: 3px;
      font-size: 0.78rem;
      animation: fadein 0.3s ease;
    }
    .event-entry.LINK_DOWN { border-color: #ff4f4f; }
    .event-entry.LINK_UP   { border-color: #4cff91; }
    .event-entry.RECOVERY  { border-color: #f7c948; }
    .event-entry.SWITCH    { border-color: #7eb8f7; }

    .event-time { color: #888; font-size: 0.7rem; }
    .event-msg  { margin-top: 2px; }
    .event-recovery { color: #f7c948; font-size: 0.7rem; margin-top: 2px; }

    @keyframes fadein { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; } }

    .node circle { stroke-width: 2px; cursor: pointer; }
    .node text { font-size: 12px; fill: #e0e0e0; text-anchor: middle; }
    .link { stroke-width: 2.5px; }
  </style>
</head>
<body>

<header>
  <h1>⚡ SDN Link Failure Detection & Recovery</h1>
  <div>
    <span id="status-dot"></span>
    <span id="status-text" style="font-size:0.8rem; color:#888">Connecting...</span>
  </div>
</header>

<div class="main">
  <div id="topology-panel">
    <h2>Live Topology</h2>
    <svg id="topo-svg"></svg>
  </div>

  <div id="right-panel">
    <div id="stats-bar">
      <div class="stat-box">
        <div class="val" id="stat-switches">0</div>
        <div class="lbl">Switches</div>
      </div>
      <div class="stat-box">
        <div class="val" id="stat-links">0</div>
        <div class="lbl">Active Links</div>
      </div>
      <div class="stat-box">
        <div class="val" id="stat-failures">0</div>
        <div class="lbl">Failures</div>
      </div>
      <div class="stat-box">
        <div class="val" id="stat-recovery">—</div>
        <div class="lbl">Last Recovery (ms)</div>
      </div>
    </div>
    <div id="event-log">
      <h2>Event Log</h2>
      <div id="events-container"></div>
    </div>
  </div>
</div>

<script>
const svg = d3.select("#topo-svg");
const width = () => document.getElementById("topology-panel").clientWidth;
const height = () => document.getElementById("topology-panel").clientHeight;

let simulation, linkSel, nodeSel;
let currentNodes = [], currentLinks = [];
let failedEdges = new Set();
let failureCount = 0;
let lastEvents = 0;

function edgeKey(s, t) { return [Math.min(s,t), Math.max(s,t)].join('-'); }

function initSim() {
  svg.selectAll("*").remove();
  svg.append("defs").append("marker")
    .attr("id", "arrow").attr("viewBox", "0 -5 10 10")
    .attr("refX", 22).attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path").attr("d", "M0,-5L10,0L-5,5").attr("fill", "#555");

  svg.append("g").attr("class", "links");
  svg.append("g").attr("class", "nodes");

  simulation = d3.forceSimulation()
    .force("link", d3.forceLink().id(d => d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(width() / 2, height() / 2))
    .force("collision", d3.forceCollide(40))
    .on("tick", ticked);
}

function ticked() {
  svg.select(".links").selectAll(".link")
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  svg.select(".nodes").selectAll(".node")
    .attr("transform", d => `translate(${d.x},${d.y})`);
}

function updateTopology(data) {
  const nodes = data.nodes.map(n => ({ id: n.id }));
  const links = data.edges.map(e => ({ source: e.source, target: e.target }));

  // preserve positions
  const posMap = {};
  currentNodes.forEach(n => posMap[n.id] = { x: n.x, y: n.y });
  nodes.forEach(n => { if (posMap[n.id]) { n.x = posMap[n.id].x; n.y = posMap[n.id].y; } });

  currentNodes = nodes;
  currentLinks = links;

  // links
  const linkG = svg.select(".links").selectAll(".link")
    .data(links, d => edgeKey(d.source.id || d.source, d.target.id || d.target));

  linkG.enter().append("line").attr("class", "link")
    .merge(linkG)
    .attr("stroke", d => {
      const k = edgeKey(d.source.id || d.source, d.target.id || d.target);
      return failedEdges.has(k) ? "#ff4f4f" : "#4cff91";
    })
    .attr("opacity", d => {
      const k = edgeKey(d.source.id || d.source, d.target.id || d.target);
      return failedEdges.has(k) ? 0.4 : 0.9;
    })
    .attr("stroke-dasharray", d => {
      const k = edgeKey(d.source.id || d.source, d.target.id || d.target);
      return failedEdges.has(k) ? "6,4" : "none";
    });

  linkG.exit().remove();

  // nodes
  const nodeG = svg.select(".nodes").selectAll(".node")
    .data(nodes, d => d.id);

  const entered = nodeG.enter().append("g").attr("class", "node")
    .call(d3.drag()
      .on("start", (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on("end",   (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

  entered.append("circle").attr("r", 20);
  entered.append("text").attr("dy", "4px").text(d => `s${d.id}`);

  entered.merge(nodeG).select("circle")
    .attr("fill", "#1a1d2e")
    .attr("stroke", "#7eb8f7");

  nodeG.exit().remove();

  simulation.nodes(currentNodes);
  simulation.force("link").links(currentLinks);
  simulation.alpha(0.3).restart();

  document.getElementById("stat-switches").textContent = nodes.length;
  document.getElementById("stat-links").textContent = links.length;
}

function updateEvents(events) {
  if (events.length === lastEvents) return;
  lastEvents = events.length;

  const container = document.getElementById("events-container");
  container.innerHTML = "";

  // newest first
  [...events].reverse().forEach(ev => {
    const div = document.createElement("div");
    div.className = `event-entry ${ev.type}`;
    div.innerHTML = `
      <div class="event-time">${ev.time}</div>
      <div class="event-msg">${ev.msg}</div>
      ${ev.recovery_ms ? `<div class="event-recovery">⚡ Recovered in ${ev.recovery_ms} ms</div>` : ''}
    `;
    container.appendChild(div);

    if (ev.type === "LINK_DOWN") {
      const m = ev.msg.match(/s(\d+)\s*<->\s*s(\d+)/);
      if (m) failedEdges.add(edgeKey(+m[1], +m[2]));
      failureCount++;
      document.getElementById("stat-failures").textContent = failureCount;
    }
    if (ev.type === "LINK_UP" || ev.type === "RECOVERY") {
      const m = ev.msg.match(/s(\d+)\s*<->\s*s(\d+)/);
      if (m) failedEdges.delete(edgeKey(+m[1], +m[2]));
      if (ev.recovery_ms) document.getElementById("stat-recovery").textContent = ev.recovery_ms;
    }
  });
}

function poll() {
  const dot = document.getElementById("status-dot");
  const txt = document.getElementById("status-text");

  fetch('/api/topology')
    .then(r => r.json())
    .then(data => {
      updateTopology(data);
      dot.className = "alive";
      txt.textContent = "Controller connected";
    })
    .catch(() => {
      dot.className = "";
      txt.textContent = "Waiting for controller...";
    });

  fetch('/api/events')
    .then(r => r.json())
    .then(updateEvents)
    .catch(() => {});
}

initSim();
poll();
setInterval(poll, 2000);
</script>
</body>
</html>
